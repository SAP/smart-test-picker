plugins {
    id 'java-gradle-plugin'
    id 'maven-publish'
}

group = 'com.sap.oss.smart-test-picker'
version = '0.1.0'

repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    implementation project(':smart-test-picker-common')
    implementation project(':smart-test-picker-core')
    implementation 'com.google.code.gson:gson:2.10.1'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.9.3'
    testImplementation gradleTestKit()
}

test {
    useJUnitPlatform()
}

gradlePlugin {
    plugins {
        smartTestPicker {
            id = 'com.sap.oss.smart-test-picker'
            implementationClass = 'com.sap.oss.smarttestpicker.SmartTestPickerPlugin'
        }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
    repositories {
        mavenLocal()
    }
}
